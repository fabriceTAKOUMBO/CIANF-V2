services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-qd,in}@host.docker.internal:5432/cinaf_db?serverVersion=16&charset=utf8"
      APP_SECRET: ${APP_SECRET:-8dd014480d5e1168bb6f0c4743ea7622}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
